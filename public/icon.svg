<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="8" fill="#006d3b"/>
  <!-- Robot body -->
  <rect x="9" y="14" width="14" height="10" rx="2" fill="#76fbab"/>
  <!-- Robot head -->
  <rect x="11" y="8" width="10" height="7" rx="2" fill="#76fbab"/>
  <!-- Eyes -->
  <circle cx="13.5" cy="11.5" r="1.5" fill="#006d3b"/>
  <circle cx="18.5" cy="11.5" r="1.5" fill="#006d3b"/>
  <!-- Antenna -->
  <line x1="16" y1="8" x2="16" y2="5" stroke="#76fbab" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="16" cy="4" r="1.5" fill="#76fbab"/>
  <!-- Wheels -->
  <circle cx="11" cy="25" r="2" fill="#58de91"/>
  <circle cx="21" cy="25" r="2" fill="#58de91"/>
</svg>
